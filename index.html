<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countsheet Module with Supabase</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-link.active { color: #4f46e5; border-bottom-color: #4f46e5; }
        /* Print styles */
        @media print {
            @page { size: landscape; margin: 0.5cm; }
            body > *:not(#printContainer) { display: none !important; }
            #printContainer { display: block !important; padding: 0; font-family: 'Inter', sans-serif; width: 100%; }
            .print-header { text-align: center; margin-bottom: 10px; border-bottom: 2px solid #333; padding-bottom: 5px; }
            .print-header h1 { font-size: 24px; font-weight: 800; color: #1e3a8a; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
            .print-table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 1px solid #888; font-size: 8px; table-layout: fixed; }
            .print-table th { background-color: #e5e7eb; font-weight: 700; padding: 5px 3px; border: 1px solid #666; text-align: center; text-transform: uppercase; }
            .print-table td { padding: 4px 3px; border: 1px solid #aaa; }
            .print-footer { margin-top: 15px; text-align: right; font-size: 8px; border-top: 1px dashed #aaa; padding-top: 4px; }
        }
    </style>
</head>

<script>
    // ==================== SUPABASE CONFIGURATION ====================
    const SUPABASE_URL = 'https://eevlafxgxplfjfpcbghc.supabase.co'; // GANTI DENGAN URL ANDA
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldmxhZnhneHBsZmpmcGNiZ2hjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTI2NjEsImV4cCI6MjA5MDQyODY2MX0.8lkUZBkl8zFRwxWcmF-v4q8OD4eQ4ld4mbwUBl0Kr3Q';               // GANTI DENGAN ANON KEY ANDA
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== GLOBAL VARIABLES ====================
    let currentResultRows = [];
    let currentCustomer = 'MAP';
    let currentMethod = 'location';
    let currentCountsheetId = null;

    // ==================== HELPER FUNCTIONS ====================
    function formatDateIndonesian(date) {
        const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function parseFilterInput(input) {
        if (!input) return { singles: [], ranges: [] };
        const parts = input.split(',').map(s=>s.trim()).filter(s=>s);
        const singles = [], ranges = [];
        parts.forEach(part => {
            if (part.includes('-')) {
                let [start,end] = part.split('-').map(s=>s.trim());
                if (start && end) ranges.push({ start, end });
            } else singles.push(part);
        });
        return { singles, ranges };
    }

    function parseLoc(loc) {
        if (!loc || typeof loc !== 'string') return null;
        let p = loc.split('-');
        return p.length>=3 ? { row: p[0], bin: p[1], lvl: p[2] } : null;
    }

    // ==================== FUNGSI BACA EXCEL ====================
    function readExcel(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                const headers = json[0].map(h => String(h || '').trim());
                const rows = json.slice(1).filter(r => r.some(c => c !== '')).map(row => {
                    let obj = {};
                    headers.forEach((h, i) => {
                        let val = row[i];
                        if ((h === 'Expiration Date' || h === 'Warehousing Date') && typeof val === 'number' && val > 30000) {
                            const d = XLSX.SSF.parse_date_code(val);
                            val = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
                        }
                        obj[h] = val;
                    });
                    return obj;
                });
                resolve(rows);
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // ==================== FILTER & AGREGASI (sama seperti kode awal) ====================
    function filterByCustomer(arr, customer) {
        if (!arr.length) return arr;
        if (customer === 'OCCUPANCY') return arr;
        const hasCID = arr[0].hasOwnProperty('Customer ID');
        const hasCIDFM = arr[0].hasOwnProperty('Customer ID FM');
        if (!hasCID && !hasCIDFM) return arr;
        return arr.filter(item => {
            const val = hasCID ? item['Customer ID'] : item['Customer ID FM'];
            return String(val || '').trim() === customer;
        });
    }

    function excludeCML(arr) {
        if (!arr.length) return arr;
        const hasCID = arr[0].hasOwnProperty('Customer ID');
        const hasCIDFM = arr[0].hasOwnProperty('Customer ID FM');
        return arr.filter(item => {
            if (hasCID) return String(item['Customer ID'] || '').trim() !== 'CML';
            if (hasCIDFM) return String(item['Customer ID FM'] || '').trim() !== 'CML';
            return true;
        });
    }

    function aggregateData(data, cust) {
        if (cust === 'OCCUPANCY') {
            const headers = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
            return data.map(item => {
                let obj = {};
                headers.forEach(h => obj[h] = item[h] || '');
                return obj;
            });
        }

        const keys = (cust === 'MAP' || cust === 'TUMI')
            ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM']
            : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM'];

        const map = new Map();
        data.forEach(item => {
            const compositeKey = keys.map(k => String(item[k] || '')).join('|');
            const qty = parseFloat(String(item['QTY On Hand']).replace(',','.')) || 0;
            if (map.has(compositeKey)) {
                map.get(compositeKey)['QTY On Hand'] += qty;
            } else {
                map.set(compositeKey, { ...item, 'QTY On Hand': qty });
            }
        });
        return Array.from(map.values());
    }

    function processSort(rows) {
        if (currentCustomer === 'OCCUPANCY') return rows;
        return rows.sort((a, b) => {
            const lA = parseLoc(a['Location ID']), lB = parseLoc(b['Location ID']);
            if (!lA || !lB) return 0;
            if (lA.row !== lB.row) return lA.row.localeCompare(lB.row);
            const bA = parseInt(lA.bin), bB = parseInt(lB.bin);
            if ((bA % 2) !== (bB % 2)) return (bB % 2) - (bA % 2);
            const vA = parseInt(lA.lvl), vB = parseInt(lB.lvl);
            return vA !== vB ? vA - vB : bA - bB;
        });
    }

    // ==================== SUPABASE FUNCTIONS ====================
    async function saveCountsheetToSupabase(rows, customer, method, filters = {}) {
        try {
            const { data: header, error: headerError } = await supabase
                .from('countsheets')
                .insert({
                    customer: customer,
                    method: method,
                    filters: filters,
                    created_at: new Date().toISOString(),
                    status: 'created'
                })
                .select()
                .single();
            if (headerError) throw headerError;

            const details = rows.map((row, idx) => ({
                countsheet_id: header.id,
                line_no: idx + 1,
                location_id: row['Location ID'] || '',
                sku: row['SKU'] || '',
                sku_desc: row['SKU Descr(L)'] || '',
                trace_id: row['Trace ID'] || '',
                batch_number: row['Batch Number'] || '',
                expiration_date: row['Expiration Date'] || '',
                uom: row['UOM'] || '',
                qty_on_hand: parseFloat(row['QTY On Hand']) || 0,
                qty_actual: null,
                remark: null,
                status: 'pending'
            }));
            const { error: detailsError } = await supabase
                .from('countsheet_details')
                .insert(details);
            if (detailsError) throw detailsError;

            return header.id;
        } catch (err) {
            console.error('Gagal menyimpan countsheet:', err);
            alert('Gagal menyimpan data ke database: ' + err.message);
            return null;
        }
    }

    async function fetchPendingCountsheets() {
        const { data, error } = await supabase
            .from('countsheets')
            .select('id, customer, method, created_at, status')
            .eq('status', 'created')
            .order('created_at', { ascending: false });
        if (error) throw error;
        return data;
    }

    async function fetchCountsheetDetails(countsheetId) {
        const { data, error } = await supabase
            .from('countsheet_details')
            .select('*')
            .eq('countsheet_id', countsheetId)
            .order('line_no', { ascending: true });
        if (error) throw error;
        return data;
    }

    async function saveInputCount(countsheetId, details) {
        const updates = details.map(d => ({
            id: d.id,
            qty_actual: d.qty_actual,
            remark: d.remark,
            status: 'inputted'
        }));
        const { error } = await supabase
            .from('countsheet_details')
            .upsert(updates, { onConflict: 'id' });
        if (error) throw error;

        await supabase
            .from('countsheets')
            .update({ status: 'inputted' })
            .eq('id', countsheetId);
    }

    async function performReconciliation(countsheetId) {
        const details = await fetchCountsheetDetails(countsheetId);
        const inputted = details.filter(d => d.status === 'inputted');
        if (inputted.length === 0) throw new Error('Belum ada input count untuk countsheet ini');

        const summary = {
            countsheet_id: countsheetId,
            total_lines: inputted.length,
            line_accurate: 0,
            location_accurate: 0,
            sku_accurate: 0,
            qty_accurate: 0,
            exp_accurate: 0
        };
        inputted.forEach(d => {
            const qtyDiff = Math.abs(d.qty_actual - d.qty_on_hand);
            if (qtyDiff === 0) summary.qty_accurate++;
            // Line accurate: jika qty actual sama
            if (qtyDiff === 0) summary.line_accurate++;
            // Location, SKU selalu akurat (karena tidak berubah)
            summary.location_accurate++;
            summary.sku_accurate++;
            // Exp accurate jika ada expiration_date dan sama (contoh sederhana)
            if (d.expiration_date && d.expiration_date === d.expiration_date) summary.exp_accurate++;
        });

        const { error } = await supabase
            .from('reconciliations')
            .insert({
                countsheet_id: countsheetId,
                ...summary,
                created_at: new Date().toISOString()
            });
        if (error) throw error;

        await supabase
            .from('countsheets')
            .update({ status: 'reconciled' })
            .eq('id', countsheetId);

        return summary;
    }

        const { data: reconciliations, error } = await supabase

            .select('*, countsheets(customer, method, created_at)');
        if (error) throw error;
        return reconciliations;
    }

        async function handleCreateProcess() {
            domCreate.errorDiv.style.display = 'none';
            currentCustomer = domCreate.customer.value;
            const type = document.querySelector('input[name="processType"]:checked').value;
            currentMethod = type;
            const binParity = document.querySelector('input[name="binParity"]:checked')?.value || '';

            try {
                let rawData = [];
                domCreate.processBtn.disabled = true;
                domCreate.loader.style.display = 'inline-block';
                domCreate.btnText.innerText = 'WAIT...';

                if (type === 'location') {
                    const file = document.getElementById('fileLoc').files[0];
                    if (!file) throw new Error("Pilih file Location dulu!");
                    rawData = await readExcel(file);

                    // Filter berdasarkan customer
                    if (currentCustomer === 'OCCUPANCY') {
                        rawData = excludeCML(rawData);
                    } else {
                        if (rawData.length > 0 && rawData[0].hasOwnProperty('Customer ID')) {
                            rawData = rawData.filter(item => String(item['Customer ID'] || '').trim() === currentCustomer);
                        }
                    }
                    // Hapus trace dengan *
                    rawData = rawData.filter(item => !String(item['Trace ID'] || '').includes('*'));

                    // Filter row, level, sku, exp, bin
                    const rowFilter = parseFilterInput(domCreate.rowFilter.value);
                    const levelFilter = parseFilterInput(domCreate.lvlFilter.value);
                    let filtered = rawData.filter(r => {
                        const l = parseLoc(r['Location ID']);
                        if (!l && currentCustomer !== 'OCCUPANCY') return false;
                        if (l) {
                            if (rowFilter.singles.length || rowFilter.ranges.length) {
                                let rowMatch = false;
                                if (rowFilter.singles.includes(l.row)) rowMatch = true;
                                if (!rowMatch) for (const range of rowFilter.ranges) if (l.row >= range.start && l.row <= range.end) { rowMatch = true; break; }
                                if (!rowMatch) return false;
                            }
                            if (levelFilter.singles.length || levelFilter.ranges.length) {
                                let levelMatch = false;
                                if (levelFilter.singles.includes(l.lvl)) levelMatch = true;
                                if (!levelMatch) {
                                    const levelNum = parseInt(l.lvl,10);
                                    for (const range of levelFilter.ranges) {
                                        const startNum = parseInt(range.start,10), endNum = parseInt(range.end,10);
                                        if (!isNaN(levelNum) && !isNaN(startNum) && !isNaN(endNum)) {
                                            if (levelNum >= startNum && levelNum <= endNum) { levelMatch = true; break; }
                                        } else if (l.lvl >= range.start && l.lvl <= range.end) { levelMatch = true; break; }
                                    }
                                }
                                if (!levelMatch) return false;
                            }
                        }
                        return true;
                    });

                    const skuList = domCreate.skuFilter.value.split(',').map(s=>s.trim()).filter(s=>s);
                    if (skuList.length) filtered = filtered.filter(r => skuList.includes(String(r['SKU']||'')));

                    const expList = domCreate.expFilter.value.split(',').map(s=>s.trim()).filter(s=>s);
                    if (expList.length) filtered = filtered.filter(r => expList.includes(String(r['Expiration Date']||'')));

                    if (binParity) {
                        filtered = filtered.filter(r => {
                            const loc = parseLoc(r['Location ID']);
                            if (!loc) return false;
                            const binNum = parseInt(loc.bin,10);
                            if (isNaN(binNum)) return false;
                            if (binParity === 'odd') return binNum % 2 === 1;
                            if (binParity === 'even') return binNum % 2 === 0;
                            return true;
                        });
                    }

                    const finalData = processSort(aggregateData(filtered, currentCustomer));
                    renderTablePreview(finalData);
                    if (finalData.length) {
                        currentResultRows = finalData;
                        domCreate.downloadBtn.style.display = 'inline-flex';
                        domCreate.printBtn.style.display = 'inline-flex';
                        // Simpan ke Supabase
                        const savedId = await saveCountsheetToSupabase(finalData, currentCustomer, currentMethod, {
                            rowFilter: domCreate.rowFilter.value,
                            levelFilter: domCreate.lvlFilter.value,
                            skuFilter: domCreate.skuFilter.value,
                            expFilter: domCreate.expFilter.value,
                            binParity: binParity
                        });
                        if (savedId) {
                            alert(`Countsheet berhasil disimpan dengan ID: ${savedId}`);
                        } else throw new Error('Gagal menyimpan countsheet');
                    } else throw new Error("Hasil proses kosong.");
                } else {
                    // Transaction method (sederhana, bisa dikembangkan)
                    const file1 = document.getElementById('file1').files[0];
                    const file2 = document.getElementById('file2').files[0];
                    if (!file1 || !file2) throw new Error("Kedua file harus diunggah!");
                    let [doc1, doc2] = await Promise.all([readExcel(file1), readExcel(file2)]);
                    // Filter customer dll (sederhana)
                    if (currentCustomer === 'OCCUPANCY') {
                        doc1 = excludeCML(doc1);
                        doc2 = excludeCML(doc2);
                    } else {
                        doc1 = filterByCustomer(doc1, currentCustomer);
                        doc2 = filterByCustomer(doc2, currentCustomer);
                    }
                    doc1 = doc1.filter(item => !String(item['Trace ID'] || '').includes('*'));
                    doc2 = doc2.filter(item => !String(item['Trace ID'] || '').includes('*'));
                    doc2 = doc2.filter(row => String(row['Transaction Type'] || '').trim() === 'Picking&Packing');

                    const map1 = new Map();
                    doc1.forEach(row => {
                        const loc = row['Location ID'] || '';
                        const sku = row['SKU'] || '';
                        const trace = row['Trace ID'] || '';
                        if (!loc && !sku && !trace) return;
                        const key = [loc, sku, trace].join('|');
                        const desc = row['SKU Descr(L)'] || '';
                        const batch = row['Batch Number'] || row['Batch No'] || '';
                        const uom = row['UOM'] || '';
                        const qty = parseFloat(String(row['QTY On Hand']).replace(',','.')) || 0;
                        if (map1.has(key)) map1.get(key).qty += qty;
                        else map1.set(key, { loc, sku, trace, desc, batch, uom, qty });
                    });

                    const map2 = new Map();
                    doc2.forEach(row => {
                        const loc = row['Location FM'] || '';
                        const sku = row['SKU FM'] || '';
                        const trace = row['ID FM'] || '';
                        if (!loc && !sku && !trace) return;
                        const key = [loc, sku, trace].join('|');
                        const desc = row['SKU Descr(L)'] || '';
                        const batch = row['Batch No'] || '';
                        const uom = row['UOM FM'] || '';
                        if (!map2.has(key)) map2.set(key, { loc, sku, trace, desc, batch, uom });
                    });

                    const results = [];
                    for (let [key, transData] of map2) {
                        const [loc, sku, trace] = key.split('|');
                        const row = {
                            'Location ID': loc,
                            'SKU': sku,
                            'Trace ID': trace,
                            'SKU Descr(L)': '',
                            'Batch Number': '',
                            'UOM': '',
                            'QTY On Hand': 0
                        };
                        if (map1.has(key)) {
                            const inv = map1.get(key);
                            row['SKU Descr(L)'] = inv.desc;
                            row['Batch Number'] = inv.batch;
                            row['UOM'] = inv.uom;
                            row['QTY On Hand'] = inv.qty;
                        } else {
                            row['SKU Descr(L)'] = transData.desc;
                            row['Batch Number'] = transData.batch;
                            row['UOM'] = transData.uom;
                        }
                        results.push(row);
                    }

                    // Filter tambahan (row, level, bin, sku, dll) dapat ditambahkan
                    let filteredResults = results.filter(r => !['RCV1','SORTATIONJBK01'].some(k => (r['Location ID']||'').toUpperCase().includes(k)));
                    const skuList = domCreate.skuFilter.value.split(',').map(s=>s.trim()).filter(s=>s);
                    if (skuList.length) filteredResults = filteredResults.filter(r => skuList.includes(r['SKU']));
                    // Sorting
                    filteredResults.sort((a,b) => (a['Location ID']||'').localeCompare(b['Location ID']||''));
                    renderTablePreview(filteredResults);
                    if (filteredResults.length) {
                        currentResultRows = filteredResults;
                        domCreate.downloadBtn.style.display = 'inline-flex';
                        domCreate.printBtn.style.display = 'inline-flex';
                        const savedId = await saveCountsheetToSupabase(filteredResults, currentCustomer, currentMethod, {});
                        if (savedId) alert(`Countsheet berhasil disimpan dengan ID: ${savedId}`);
                        else throw new Error('Gagal menyimpan countsheet');
                    } else throw new Error("Hasil proses kosong.");
                }
            } catch (err) {
                domCreate.errorDiv.style.display = 'block';
                domCreate.errorText.innerText = err.message;
            } finally {
                domCreate.processBtn.disabled = false;
                domCreate.loader.style.display = 'none';
                domCreate.btnText.innerText = 'CREATED COUNTSHEET';
            }
        }

        domCreate.processBtn.onclick = handleCreateProcess;
        domCreate.downloadBtn.onclick = () => downloadExcel();
        domCreate.printBtn.onclick = () => printReport();
    }

    // ==================== RENDER INPUT PAGE ====================
    async function renderInputPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4">Input Countsheet</h2>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Pilih Countsheet</label>
                    <select id="countsheetSelect" class="border rounded p-2 w-full"></select>
                </div>
                <div id="inputTableContainer" style="display: none;">
                    <table class="min-w-full divide-y divide-gray-200 border">
                        <thead class="bg-gray-50"><tr><th>Line</th><th>Location ID</th><th>SKU</th><th>SKU Desc</th><th>QTY On Hand</th><th>Qty Actual</th><th>Remark</th></tr></thead>
                        <tbody id="inputTableBody"></tbody>
                    </table>
                    <div class="mt-4 flex justify-end"><button id="submitInputBtn" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Submit Input</button></div>
                </div>
            </div>
        `;
        const countsheets = await fetchPendingCountsheets();
        const select = document.getElementById('countsheetSelect');
        select.innerHTML = '<option value="">-- Pilih Countsheet --</option>' + countsheets.map(c => `<option value="${c.id}">${c.customer} - ${new Date(c.created_at).toLocaleString()}</option>`).join('');
        select.addEventListener('change', async (e) => {
            const id = e.target.value;
            if (!id) return;
            const details = await fetchCountsheetDetails(id);
            const container = document.getElementById('inputTableContainer');
            container.style.display = 'block';
            const tbody = document.getElementById('inputTableBody');
            tbody.innerHTML = details.map(d => `
                <tr>
                    <td class="px-4 py-2 border">${d.line_no}</td>
                    <td class="px-4 py-2 border">${d.location_id}</td>
                    <td class="px-4 py-2 border">${d.sku}</td>
                    <td class="px-4 py-2 border">${d.sku_desc}</td>
                    <td class="px-4 py-2 border">${d.qty_on_hand}</td>
                    <td class="px-4 py-2 border"><input type="number" class="qty-actual w-24 border rounded p-1" data-id="${d.id}" value="${d.qty_actual || ''}"></td>
                    <td class="px-4 py-2 border"><input type="text" class="remark w-40 border rounded p-1" data-id="${d.id}" value="${d.remark || ''}"></td>
                </tr>
            `).join('');
            window.currentInputDetails = details;
        });
        document.getElementById('submitInputBtn')?.addEventListener('click', async () => {
            const id = select.value;
            if (!id) return;
            const inputs = [];
            document.querySelectorAll('.qty-actual').forEach(el => {
                inputs.push({ id: el.dataset.id, qty_actual: parseFloat(el.value) || 0, remark: document.querySelector(`.remark[data-id="${el.dataset.id}"]`).value });
            });
            try {
                await saveInputCount(id, inputs);
                alert('Input berhasil disimpan');
                renderInputPage();
            } catch (err) { alert('Error: ' + err.message); }
        });
    }

    // ==================== RENDER RECONCILIATION PAGE ====================
    async function renderReconciliationPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4">Reconciliation</h2>
                <div class="mb-4"><label class="block text-sm font-medium mb-1">Pilih Countsheet yang Sudah Diinput</label><select id="reconcileSelect" class="border rounded p-2 w-full"></select></div>
                <div id="reconcileResult" style="display: none;" class="mt-4 p-4 bg-gray-50 rounded"></div>
                <button id="doReconcileBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Lakukan Reconciliation</button>
            </div>
        `;
        const { data: countsheets, error } = await supabase
            .from('countsheets')
            .select('id, customer, created_at')
            .eq('status', 'inputted')
            .order('created_at', { ascending: false });
        if (error) throw error;
        const select = document.getElementById('reconcileSelect');
        select.innerHTML = '<option value="">-- Pilih Countsheet --</option>' + countsheets.map(c => `<option value="${c.id}">${c.customer} - ${new Date(c.created_at).toLocaleString()}</option>`).join('');
        select.addEventListener('change', (e) => {
            const val = e.target.value;
            document.getElementById('reconcileResult').style.display = val ? 'block' : 'none';
        });
        document.getElementById('doReconcileBtn').addEventListener('click', async () => {
            const id = select.value;
            if (!id) return;
            try {
                const summary = await performReconciliation(id);
                const resultDiv = document.getElementById('reconcileResult');
                resultDiv.innerHTML = `<h3 class="font-bold mb-2">Hasil Reconciliation</h3><ul class="list-disc pl-5"><li>Total Lines: ${summary.total_lines}</li><li>Line Accurate: ${summary.line_accurate}</li><li>Location Accurate: ${summary.location_accurate}</li><li>SKU Accurate: ${summary.sku_accurate}</li><li>Qty Accurate: ${summary.qty_accurate}</li><li>Exp Accurate: ${summary.exp_accurate}</li></ul>`;
                alert('Reconciliation berhasil disimpan');
                renderReconciliationPage();
            } catch (err) { alert('Error: ' + err.message); }
        });
    }

    // ==================== RENDER DASHBOARD PAGE ====================
    async function renderDashboardPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold mb-4">Dashboard Report</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><canvas id="lineChart"></canvas></div>
                    <div><canvas id="locationChart"></canvas></div>
                    <div><canvas id="skuChart"></canvas></div>
                    <div><canvas id="qtyChart"></canvas></div>
                    <div><canvas id="expChart"></canvas></div>
                </div>
            </div>
        `;
        const data = await fetchDashboardData();
        const lineAcc = data.map(d => d.line_accurate / d.total_lines * 100);
        const locAcc = data.map(d => d.location_accurate / d.total_lines * 100);
        const skuAcc = data.map(d => d.sku_accurate / d.total_lines * 100);
        const qtyAcc = data.map(d => d.qty_accurate / d.total_lines * 100);
        const expAcc = data.map(d => d.exp_accurate / d.total_lines * 100);
        const labels = data.map((_, i) => `Countsheet ${i+1}`);
        new Chart(document.getElementById('lineChart'), { type: 'bar', data: { labels, datasets: [{ label: 'Line Accuracy (%)', data: lineAcc, backgroundColor: 'rgba(54,162,235,0.5)' }] } });
        new Chart(document.getElementById('locationChart'), { type: 'bar', data: { labels, datasets: [{ label: 'Location Accuracy (%)', data: locAcc, backgroundColor: 'rgba(255,99,132,0.5)' }] } });
        new Chart(document.getElementById('skuChart'), { type: 'bar', data: { labels, datasets: [{ label: 'SKU Accuracy (%)', data: skuAcc, backgroundColor: 'rgba(75,192,192,0.5)' }] } });
        new Chart(document.getElementById('qtyChart'), { type: 'bar', data: { labels, datasets: [{ label: 'Qty Accuracy (%)', data: qtyAcc, backgroundColor: 'rgba(153,102,255,0.5)' }] } });
        new Chart(document.getElementById('expChart'), { type: 'bar', data: { labels, datasets: [{ label: 'Exp Accuracy (%)', data: expAcc, backgroundColor: 'rgba(255,159,64,0.5)' }] } });
    }

    // ==================== NAVIGATION ====================
    async function navigate(page) {
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`).classList.add('active');
        if (page === 'create') renderCreatePage();
        else if (page === 'input') await renderInputPage();
        else if (page === 'reconciliation') await renderReconciliationPage();
        else if (page === 'dashboard') await renderDashboardPage();
    }

    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => { e.preventDefault(); navigate(link.dataset.page); });
    });

    navigate('create');
</script>
