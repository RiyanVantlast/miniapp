<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countsheet Module</title>
    <!-- Tailwind & SheetJS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Print styles */
        @media print {
            @page {
                size: landscape;
                margin: 0.5cm;
            }
            body > *:not(#printContainer) {
                display: none !important;
            }
            #printContainer {
                display: block !important;
                padding: 0;
                font-family: 'Inter', sans-serif;
                width: 100%;
            }
            .print-header {
                text-align: center;
                margin-bottom: 10px;
                border-bottom: 2px solid #333;
                padding-bottom: 5px;
            }
            .print-header h1 {
                font-size: 24px;
                font-weight: 800;
                color: #1e3a8a;
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .print-header p {
                margin: 2px 0;
                font-size: 10px;
                color: #333;
            }
            .print-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
                border: 1px solid #888;
                font-size: 8px;
                table-layout: fixed;
            }
            .print-table th {
                background-color: #e5e7eb;
                font-weight: 700;
                padding: 5px 3px;
                border: 1px solid #666;
                text-align: center;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                overflow: hidden;
                word-wrap: break-word;
            }
            .print-table td {
                padding: 4px 3px;
                border: 1px solid #aaa;
                color: #111;
                overflow: hidden;
                word-wrap: break-word;
            }
            .print-table td.print-extra,
            .print-table th.print-extra {
                background-color: #f9fafb;
            }
            .print-footer {
                margin-top: 15px;
                text-align: right;
                font-size: 8px;
                color: #555;
                border-top: 1px dashed #aaa;
                padding-top: 4px;
            }
        }
    </style>
</head>
<body class="h-full">

<div class="min-h-full flex flex-col">
    <!-- Navbar (tanpa base64, placeholder) -->
    <nav class="bg-white border-b border-gray-200 py-2 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <!-- Logo Lincgrp placeholder -->
                <img src=" alt="Lincgrp" class="h-12 w-auto">
                <span class="text-sm font-bold text-gray-900"> JABABEKA <span class="text-indigo-600">WH</span></span>
            </div>
            <div class="flex gap-2 items-center">
                <!-- Logo Linclog placeholder -->
                <img src="" alt="Linclog" class="h-12 w-auto">
                <button id="processBtn" class="inline-flex items-center px-4 py-2 text-xs font-bold rounded-md text-white bg-indigo-600 hover:bg-indigo-700 transition-all active:scale-95 shadow-md">
                    <span id="btnText">CREATED COUNTSHEET</span>
                    <span class="spinner ml-2" id="loadingSpinner" style="display: none;"></span>
                </button>
                <button id="downloadBtn" style="display: none;" class="inline-flex items-center px-4 py-2 text-xs font-bold rounded-md text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 shadow-sm transition-all active:scale-95">
                    EXPORT EXCEL
                </button>
                <button id="printBtn" style="display: none;" class="inline-flex items-center px-4 py-2 text-xs font-bold rounded-md text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 shadow-sm transition-all active:scale-95">
                    PRINT
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full p-4 flex flex-col gap-4">
        <!-- Bagian filter dan upload -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
            <div class="lg:col-span-4 bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Customer</label>
                        <select id="customerSelect" class="w-full px-2 py-2 rounded-lg border-gray-200 bg-gray-50 text-xs font-semibold focus:ring-2 focus:ring-indigo-500 transition-all">
                            <option value="MAP">MAP</option>
                            <option value="TUMI">TUMI</option>
                            <option value="YFI">YFI</option>
                            <option value="BRL_JKT">BRL_JKT</option>
                            <option value="OCCUPANCY">OCCUPANCY</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Metode Cycle Count</label>
                        <div class="flex bg-gray-50 p-1 rounded-lg border border-gray-200">
                            <label class="flex-1 text-center py-1 rounded-md cursor-pointer transition-all has-[:checked]:bg-white has-[:checked]:shadow-sm has-[:checked]:text-indigo-600">
                                <input type="radio" name="processType" value="location" checked class="hidden">
                                <span class="text-[10px] font-bold uppercase">Location</span>
                            </label>
                            <label class="flex-1 text-center py-1 rounded-md cursor-pointer transition-all has-[:checked]:bg-white has-[:checked]:shadow-sm has-[:checked]:text-indigo-600">
                                <input type="radio" name="processType" value="transaction" class="hidden">
                                <span class="text-[10px] font-bold uppercase">Transaction</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="rowFilter" placeholder="Filter Row (AO,AR)" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-lg text-xs placeholder:text-gray-400 focus:bg-white transition-all">
                    <input type="text" id="levelFilter" placeholder="Filter Level (01,10)" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-lg text-xs placeholder:text-gray-400 focus:bg-white transition-all">
                </div>
                <!-- Filter SKU & Expiration Date -->
                <div class="grid grid-cols-2 gap-3 mt-3">
                    <input type="text" id="skuFilter" placeholder="Filter SKU (SKU1,SKU2)" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-lg text-xs placeholder:text-gray-400 focus:bg-white transition-all">
                    <input type="text" id="expFilter" placeholder="Filter Exp Date (YYYY-MM-DD)" class="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-lg text-xs placeholder:text-gray-400 focus:bg-white transition-all">
                </div>
            </div>

            <div class="lg:col-span-8 bg-white border border-gray-200 rounded-xl p-4 shadow-sm flex items-center" id="uploadArea">
                <!-- Upload fields akan diisi oleh JavaScript -->
            </div>
        </div>

        <!-- Tabel preview -->
        <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <span id="rowCount" class="bg-indigo-100 text-indigo-700 text-[10px] font-black px-3 py-1 rounded-full uppercase">0 Baris Terproses</span>
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest italic">Preview 10 Baris Pertama</span>
            </div>

            <div class="overflow-x-auto custom-scroll" style="max-height: 400px;">
                <table id="resultTable" class="min-w-full divide-y divide-gray-200">
                    <thead id="tableHeader" class="bg-gray-50 sticky top-0 z-10"></thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-50"></tbody>
                </table>
                <div id="emptyMsg" class="py-16 text-center">
                    <p class="text-[11px] font-bold text-gray-300 uppercase tracking-[0.2em]">Menunggu Unggahan & Proses</p>
                </div>
            </div>
        </div>

        <!-- Pesan error -->
        <div id="errorMessage" style="display: none;" class="p-3 bg-red-50 border border-red-200 rounded-xl">
            <p id="errorText" class="text-xs text-red-600 font-bold italic text-center"></p>
        </div>
    </main>
</div>

<!-- Container untuk cetak (disembunyikan di layar) -->
<div id="printContainer" style="display: none;"></div>

<script>
(function() {
    // ==================== INISIALISASI DOM ====================
    const dom = {
        customer: document.getElementById('customerSelect'),
        rowFilter: document.getElementById('rowFilter'),
        lvlFilter: document.getElementById('levelFilter'),
        skuFilter: document.getElementById('skuFilter'),
        expFilter: document.getElementById('expFilter'),
        uploadArea: document.getElementById('uploadArea'),
        processBtn: document.getElementById('processBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        printBtn: document.getElementById('printBtn'),
        tableHeader: document.getElementById('tableHeader'),
        tableBody: document.getElementById('tableBody'),
        rowCount: document.getElementById('rowCount'),
        emptyMsg: document.getElementById('emptyMsg'),
        errorDiv: document.getElementById('errorMessage'),
        errorText: document.getElementById('errorText'),
        loader: document.getElementById('loadingSpinner'),
        btnText: document.getElementById('btnText')
    };
(async function initLogos() {
    lincgrpLogoBase64 = await loadLogoFromFile('lincgrp_logo.txt');
    linclogLogoBase64 = await loadLogoFromFile('linclog_logo.txt');

    // Set src navbar images
    const lincgrpImg = document.getElementById('lincgrpLogo');
    const linclogImg = document.getElementById('linclogLogo');
    if (lincgrpImg && lincgrpLogoBase64) lincgrpImg.src = lincgrpLogoBase64;
    if (linclogImg && linclogLogoBase64) linclogImg.src = linclogLogoBase64;
})();
    // ==================== VARIABEL GLOBAL ====================
    let currentResultRows = [];
    let currentCustomer = 'MAP';
    let currentMethod = 'location'; // 'location' atau 'transaction'

    // Fungsi untuk memfilter array berdasarkan customer, hanya jika customer bukan OCCUPANCY
    function filterByCustomer(arr, customer) {
        if (!arr.length) return arr;
        if (customer === 'OCCUPANCY') return arr; // OCCUPANCY tidak difilter per customer, tapi nanti ada pengecualian CML
        const hasCID = arr[0].hasOwnProperty('Customer ID');
        const hasCIDFM = arr[0].hasOwnProperty('Customer ID FM');
        // Jika tidak ada kolom customer, kembalikan array asli (tidak difilter)
        if (!hasCID && !hasCIDFM) return arr;
        return arr.filter(item => {
            const val = hasCID ? item['Customer ID'] : item['Customer ID FM'];
            return String(val || '').trim() === customer;
        });
    }

    // Fungsi untuk mengecualikan baris dengan Customer ID = "CML" (untuk OCCUPANCY)
    function excludeCML(arr) {
        if (!arr.length) return arr;
        const hasCID = arr[0].hasOwnProperty('Customer ID');
        const hasCIDFM = arr[0].hasOwnProperty('Customer ID FM');
        return arr.filter(item => {
            if (hasCID) {
                return String(item['Customer ID'] || '').trim() !== 'CML';
            }
            if (hasCIDFM) {
                return String(item['Customer ID FM'] || '').trim() !== 'CML';
            }
            return true; // jika tidak ada kolom customer, tetap dipertahankan
        });
    }

    // Fungsi untuk parse input filter (mendukung koma dan range dengan tanda hubung)
    function parseFilterInput(input) {
        if (!input) return { singles: [], ranges: [] };
        const parts = input.split(',').map(s => s.trim()).filter(s => s);
        const singles = [];
        const ranges = [];
        parts.forEach(part => {
            if (part.includes('-')) {
                const [start, end] = part.split('-').map(s => s.trim());
                if (start && end) {
                    ranges.push({ start, end });
                }
            } else {
                singles.push(part);
            }
        });
        return { singles, ranges };
    }

    // Ukuran kolom tetap (untuk print)
    const columnWidths = {
        'No': 27,
        'Location ID': 50,
        'SKU': 100,
        'SKU Descr(L)': 200,
        'Trace ID': 60,
        'Batch Number': 50,
        'Expiration Date': 50,
        'UOM': 25,
        'QTY On Hand': 30,
        'Qty Actual': 35,
        'Remark': 95
    };
    const DEFAULT_WIDTH = 60;

    // Fungsi untuk memformat tanggal dalam bahasa Indonesia
    function formatDateIndonesian(date) {
        const months = [
            'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
            'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
        ];
        const day = date.getDate();
        const month = months[date.getMonth()];
        const year = date.getFullYear();
        return `${day} ${month} ${year}`;
    }

    // ==================== FUNGSI BANTU ====================

    // Membaca file Excel dan mengembalikan array of objects
    function readExcel(file) {
        return new Promise((resolve, reject) => {
            if (!file) return reject(new Error("File tidak ditemukan"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                    if (json.length < 1) throw new Error("File kosong");

                    const headers = json[0].map(h => String(h || '').trim());
                    const dataRows = json.slice(1).filter(r => r.some(c => c !== '')).map(row => {
                        let obj = {};
                        headers.forEach((h, i) => {
                            let val = row[i];
                            if ((h === 'Expiration Date' || h === 'Warehousing Date') && typeof val === 'number' && val > 30000) {
                                const d = XLSX.SSF.parse_date_code(val);
                                val = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
                            }
                            // Normalisasi: jika header "Batch No", simpan sebagai "Batch Number"
                            let key = h;
                            if (h === 'Batch No') {
                                key = 'Batch Number';
                            }
                            obj[key] = val;
                        });
                        return obj;
                    });
                    resolve(dataRows);
                } catch (err) { reject(err); }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // Parsing location ID (format: ROW-BIN-LEVEL)
    function parseLoc(loc) {
        if (!loc || typeof loc !== 'string') return null;
        const p = loc.split('-');
        return p.length >= 3 ? { row: p[0], bin: p[1], lvl: p[2] } : null;
    }

    // Sorting khusus untuk customer non-OCCUPANCY (hanya dipakai di metode location)
    function processSort(rows) {
        if (currentCustomer === 'OCCUPANCY') return rows;
        return rows.sort((a, b) => {
            const lA = parseLoc(a['Location ID']), lB = parseLoc(b['Location ID']);
            if (!lA || !lB) return 0;
            if (lA.row !== lB.row) return lA.row.localeCompare(lB.row);
            const bA = parseInt(lA.bin), bB = parseInt(lB.bin);
            if ((bA % 2) !== (bB % 2)) return (bB % 2) - (bA % 2);
            const vA = parseInt(lA.lvl), vB = parseInt(lB.lvl);
            return vA !== vB ? vA - vB : bA - bB;
        });
    }

    // Agregasi data berdasarkan customer (hanya dipakai di metode location)
    function aggregateData(data, cust) {
        if (cust === 'OCCUPANCY') {
            const headers = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
            return data.map(item => {
                let obj = {};
                headers.forEach(h => obj[h] = item[h] || '');
                return obj;
            });
        }

        const keys = (cust === 'MAP' || cust === 'TUMI') 
            ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM']
            : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM'];

        const map = new Map();
        data.forEach(item => {
            const compositeKey = keys.map(k => String(item[k] || '')).join('|');
            const qty = parseFloat(String(item['QTY On Hand']).replace(',','.')) || 0;
            if (map.has(compositeKey)) {
                map.get(compositeKey)['QTY On Hand'] += qty;
            } else {
                map.set(compositeKey, { ...item, 'QTY On Hand': qty });
            }
        });
        return Array.from(map.values());
    }

    // Render area upload berdasarkan metode yang dipilih
    function renderUploadFields() {
        const type = document.querySelector('input[name="processType"]:checked').value;
        if (type === 'location') {
            dom.uploadArea.innerHTML = `
                <div class="flex items-center gap-4 w-full">
                    <div class="shrink-0 bg-indigo-50 px-3 py-2 rounded-lg border border-indigo-100 text-[10px] font-bold text-indigo-600 uppercase">Inventory Balance</div>
                    <input type="file" id="fileLoc" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white file:font-bold cursor-pointer hover:file:bg-indigo-700 transition-all">
                </div>`;
        } else {
            dom.uploadArea.innerHTML = `
                <div class="grid grid-cols-2 gap-4 w-full">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-gray-400 uppercase shrink-0">Inventory Balance:</span>
                        <input type="file" id="file1" class="text-[10px] w-full file:bg-gray-100 file:border-0 file:rounded-md file:px-2 file:py-1 file:font-bold">
                    </div>
                    <div class="flex items-center gap-2 border-l border-gray-100 pl-4">
                        <span class="text-[10px] font-bold text-gray-400 uppercase shrink-0">Transaction Log:</span>
                        <input type="file" id="file2" class="text-[10px] w-full file:bg-gray-100 file:border-0 file:rounded-md file:px-2 file:py-1 file:font-bold">
                    </div>
                </div>`;
        }
    }

    // Render tabel preview (10 baris pertama) – disesuaikan dengan metode
    function renderTable(rows) {
        let baseCols;
        if (currentMethod === 'transaction') {
            // Header baru untuk metode transaction
            baseCols = ['Location ID', 'SKU', 'SKU Descr(L)', 'Trace ID', 'Batch Number', 'UOM', 'QTY On Hand'];
        } else {
            // Header lama berdasarkan customer (metode location)
            if (currentCustomer === 'OCCUPANCY') {
                baseCols = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
            } else {
                baseCols = (currentCustomer === 'MAP' || currentCustomer === 'TUMI')
                    ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM','QTY On Hand']
                    : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM','QTY On Hand'];
            }
        }
        // Tambahkan kolom No, Qty Actual, Remark
        const printCols = ['No', ...baseCols, 'Qty Actual', 'Remark'];

        // Buat header tabel dengan lebar (opsional)
        const headerCells = printCols.map(colName => {
            let width = columnWidths[colName] || DEFAULT_WIDTH;
            return `<th style="width: ${width}px;" class="px-4 py-3 text-left text-[10px] font-black text-gray-400 uppercase tracking-tighter">${colName}</th>`;
        }).join('');
        dom.tableHeader.innerHTML = `<tr>${headerCells}</tr>`;

        // Sembunyikan pesan kosong jika ada data
        dom.emptyMsg.style.display = rows.length ? 'none' : 'block';

        // Isi body dengan 10 baris pertama
        dom.tableBody.innerHTML = rows.slice(0, 10).map((r, idx) => {
            const cells = [
                `<td class="px-4 py-2.5 whitespace-nowrap text-[11px] text-gray-700 font-medium">${idx + 1}</td>`,
                ...baseCols.map(c => `<td class="px-4 py-2.5 whitespace-nowrap text-[11px] text-gray-700 font-medium">${r[c] || '-'}</td>`),
                `<td class="px-4 py-2.5 whitespace-nowrap text-[11px] text-gray-700 font-medium"></td>`, // Qty Actual
                `<td class="px-4 py-2.5 whitespace-nowrap text-[11px] text-gray-700 font-medium"></td>`  // Remark
            ];
            return `<tr class="hover:bg-indigo-50/30 transition-colors border-b border-gray-50 last:border-0">${cells.join('')}</tr>`;
        }).join('');

        dom.rowCount.innerText = `${rows.length} BARIS TERPROSES`;
    }

    // ==================== FUNGSI UTAMA ====================

    // Proses utama (dipanggil saat tombol CREATED COUNTSHEET diklik)
    async function handleProcess() {
        dom.errorDiv.style.display = 'none';
        currentCustomer = dom.customer.value;
        const type = document.querySelector('input[name="processType"]:checked').value;
        currentMethod = type; // simpan metode yang dipilih

        try {
            let rawData = [];
            dom.processBtn.disabled = true;
            dom.loader.style.display = 'inline-block';
            dom.btnText.innerText = 'WAIT...';

            if (type === 'location') {
                // ========== LOGIKA LAMA UNTUK LOCATION (DENGAN TAMBAHAN FILTER CML UNTUK OCCUPANCY) ==========
                const file = document.getElementById('fileLoc').files[0];
                if (!file) throw new Error("Pilih file Location dulu!");
                rawData = await readExcel(file);

                // Jika customer OCCUPANCY, terapkan filter CML (kecualikan Customer ID = "CML")
                if (currentCustomer === 'OCCUPANCY') {
                    rawData = excludeCML(rawData);
                } else {
                    // Filter berdasarkan customer yang dipilih
                    if (rawData.length > 0 && rawData[0].hasOwnProperty('Customer ID')) {
                        rawData = rawData.filter(item => String(item['Customer ID'] || '').trim() === currentCustomer);
                    }
                }
					
				// Abaikan baris jika Trace ID mengandung karakter "*"
					rawData = rawData.filter(item => {
				    const trace = String(item['Trace ID'] || '').trim();
 						return !trace.includes('*'); // true jika tidak mengandung '*'
					});

                // Filter Row, Level, SKU, Exp (sama seperti sebelumnya)
                const rowFilter = parseFilterInput(dom.rowFilter.value);
                const levelFilter = parseFilterInput(dom.lvlFilter.value);
                let filtered = rawData.filter(r => {
                    const l = parseLoc(r['Location ID']);
                    if (!l && currentCustomer !== 'OCCUPANCY') return false;
                    if (l) {
                        if (rowFilter.singles.length || rowFilter.ranges.length) {
                            let rowMatch = false;
                            if (rowFilter.singles.includes(l.row)) rowMatch = true;
                            if (!rowMatch) {
                                for (const range of rowFilter.ranges) {
                                    if (l.row >= range.start && l.row <= range.end) {
                                        rowMatch = true;
                                        break;
                                    }
                                }
                            }
                            if (!rowMatch) return false;
                        }
                        if (levelFilter.singles.length || levelFilter.ranges.length) {
                            let levelMatch = false;
                            if (levelFilter.singles.includes(l.lvl)) levelMatch = true;
                            if (!levelMatch) {
                                const levelNum = parseInt(l.lvl, 10);
                                for (const range of levelFilter.ranges) {
                                    const startNum = parseInt(range.start, 10);
                                    const endNum = parseInt(range.end, 10);
                                    if (!isNaN(levelNum) && !isNaN(startNum) && !isNaN(endNum)) {
                                        if (levelNum >= startNum && levelNum <= endNum) {
                                            levelMatch = true;
                                            break;
                                        }
                                    } else {
                                        if (l.lvl >= range.start && l.lvl <= range.end) {
                                            levelMatch = true;
                                            break;
                                        }
                                    }
                                }
                            }
                            if (!levelMatch) return false;
                        }
                    }
                    return true;
                });

                // Filter SKU
                const skuList = dom.skuFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (skuList.length > 0) {
                    filtered = filtered.filter(r => skuList.includes(String(r['SKU'] || '')));
                }

                // Filter Expiration Date
                const expList = dom.expFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (expList.length > 0) {
                    filtered = filtered.filter(r => expList.includes(String(r['Expiration Date'] || '')));
                }

                const finalData = processSort(aggregateData(filtered, currentCustomer));
                renderTable(finalData);
                if (finalData.length > 0) {
                    dom.downloadBtn.style.display = 'inline-flex';
                    dom.printBtn.style.display = 'inline-flex';
                    currentResultRows = finalData;
                } else {
                    throw new Error("Hasil proses kosong. Cek filter/isi file.");
                }

            } else {
                // ========== LOGIKA BARU UNTUK TRANSACTION (BERDASARKAN KEY DARI TRANSACTION LOG) ==========
                const file1 = document.getElementById('file1').files[0];
                const file2 = document.getElementById('file2').files[0];
                if (!file1 || !file2) throw new Error("Kedua file (Inventory & Transaction) harus diunggah!");

                let [doc1, doc2] = await Promise.all([readExcel(file1), readExcel(file2)]);

                // Filter customer: untuk OCCUPANCY, kecualikan CML; untuk lainnya filter sesuai customer
                if (currentCustomer === 'OCCUPANCY') {
                    doc1 = excludeCML(doc1);
                    doc2 = excludeCML(doc2);
                } else {
                    doc1 = filterByCustomer(doc1, currentCustomer);
                    doc2 = filterByCustomer(doc2, currentCustomer);
                }
				// ===== TAMBAHAN FILTER TRACE ID UNTUK KEDUA FILE =====
					doc1 = doc1.filter(item => {
    				const trace = String(item['Trace ID'] || '').trim();
  					return !trace.includes('*');
				});
					doc2 = doc2.filter(item => {
    				const trace = String(item['Trace ID'] || '').trim();
    				return !trace.includes('*');
				});  

                // **Filter Transaction Type = "Picking&Packing" pada doc2**
                doc2 = doc2.filter(row => String(row['Transaction Type'] || '').trim() === 'Picking&Packing');

                // --- Normalisasi data Doc1 (Inventory) dengan penjumlahan QTY ---
                const map1 = new Map(); // key: location|sku|trace -> { desc, batch, uom, qty }
                doc1.forEach(row => {
                    const loc = row['Location ID'] || '';
                    const sku = row['SKU'] || '';
                    const trace = row['Trace ID'] || '';
                    if (!loc && !sku && !trace) return;
                    const key = [loc, sku, trace].join('|');
                    const desc = row['SKU Descr(L)'] || '';
                    const batch = row['Batch Number'] || row['Batch No'] || '';
                    const uom = row['UOM'] || '';
                    const qty = parseFloat(String(row['QTY On Hand']).replace(',', '.')) || 0;

                    if (map1.has(key)) {
                        const existing = map1.get(key);
                        existing.qty += qty;
                    } else {
                        map1.set(key, { loc, sku, trace, desc, batch, uom, qty });
                    }
                });

                // --- Normalisasi data Doc2 (Transaction) ---
                // Kita hanya perlu menyimpan data pertama untuk setiap key (sebagai fallback)
                const map2 = new Map(); // key: location|sku|trace -> { desc, batch, uom }
                doc2.forEach(row => {
                    const loc = row['Location FM'] || '';
                    const sku = row['SKU FM'] || '';
                    const trace = row['ID FM'] || '';
                    if (!loc && !sku && !trace) return;
                    const key = [loc, sku, trace].join('|');
                    const desc = row['SKU Descr(L)'] || '';
                    const batch = row['Batch No'] || '';
                    const uom = row['UOM FM'] || '';
                    if (!map2.has(key)) {
                        map2.set(key, { loc, sku, trace, desc, batch, uom });
                    }
                });

                // **Basis data adalah key dari Transaction Log (map2)**
                const results = [];
                for (let [key, transData] of map2.entries()) {
                    const [loc, sku, trace] = key.split('|');
                    const row = {
                        'Location ID': loc,
                        'SKU': sku,
                        'Trace ID': trace,
                        'SKU Descr(L)': '',
                        'Batch Number': '',
                        'UOM': '',
                        'QTY On Hand': 0, // default 0
                        'Qty Actual': '',
                        'Remark': ''
                    };

                    if (map1.has(key)) {
                        // Ambil data dari Inventory
                        const invData = map1.get(key);
                        row['SKU Descr(L)'] = invData.desc;
                        row['Batch Number'] = invData.batch;
                        row['UOM'] = invData.uom;
                        row['QTY On Hand'] = invData.qty; // sudah angka
                    } else {
                        // Ambil data dari Transaction (fallback)
                        row['SKU Descr(L)'] = transData.desc;
                        row['Batch Number'] = transData.batch;
                        row['UOM'] = transData.uom;
                        // QTY On Hand tetap 0 (sudah di-set)
                    }

                    results.push(row);
                }

                // **FILTER TAMBAHAN: Abaikan Location ID yang mengandung "RCV1" atau "SORTATIONJBK01" (case‑insensitive)**
                const excludedKeywords = ['RCV1', 'SORTATIONJBK01'];
                let filteredResults = results.filter(r => {
                    const loc = r['Location ID'] || '';
                    return !excludedKeywords.some(keyword => 
                        loc.toUpperCase().includes(keyword.toUpperCase())
                    );
                });

                // Terapkan filter SKU (jika ada)
                const skuList = dom.skuFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (skuList.length > 0) {
                    filteredResults = filteredResults.filter(r => skuList.includes(r['SKU']));
                }

                // Filter Row dan Level (jika ada)
                const rowFilter = parseFilterInput(dom.rowFilter.value);
                const levelFilter = parseFilterInput(dom.lvlFilter.value);
                if (rowFilter.singles.length || rowFilter.ranges.length || levelFilter.singles.length || levelFilter.ranges.length) {
                    filteredResults = filteredResults.filter(r => {
                        const locParsed = parseLoc(r['Location ID']);
                        if (!locParsed) return true; // jika tidak bisa diparse, lewati filter
                        // Filter Row
                        if (rowFilter.singles.length || rowFilter.ranges.length) {
                            let rowMatch = false;
                            if (rowFilter.singles.includes(locParsed.row)) rowMatch = true;
                            if (!rowMatch) {
                                for (const range of rowFilter.ranges) {
                                    if (locParsed.row >= range.start && locParsed.row <= range.end) {
                                        rowMatch = true;
                                        break;
                                    }
                                }
                            }
                            if (!rowMatch) return false;
                        }
                        // Filter Level
                        if (levelFilter.singles.length || levelFilter.ranges.length) {
                            let levelMatch = false;
                            if (levelFilter.singles.includes(locParsed.lvl)) levelMatch = true;
                            if (!levelMatch) {
                                const levelNum = parseInt(locParsed.lvl, 10);
                                for (const range of levelFilter.ranges) {
                                    const startNum = parseInt(range.start, 10);
                                    const endNum = parseInt(range.end, 10);
                                    if (!isNaN(levelNum) && !isNaN(startNum) && !isNaN(endNum)) {
                                        if (levelNum >= startNum && levelNum <= endNum) {
                                            levelMatch = true;
                                            break;
                                        }
                                    } else {
                                        if (locParsed.lvl >= range.start && locParsed.lvl <= range.end) {
                                            levelMatch = true;
                                            break;
                                        }
                                    }
                                }
                            }
                            if (!levelMatch) return false;
                        }
                        return true;
                    });
                }

                // Urutkan berdasarkan Location ID (sederhana)
                filteredResults.sort((a, b) => (a['Location ID'] || '').localeCompare(b['Location ID'] || ''));

                renderTable(filteredResults);
                if (filteredResults.length > 0) {
                    dom.downloadBtn.style.display = 'inline-flex';
                    dom.printBtn.style.display = 'inline-flex';
                    currentResultRows = filteredResults;
                } else {
                    throw new Error("Hasil proses kosong. Cek filter/isi file.");
                }
            }

        } catch (err) {
            dom.errorDiv.style.display = 'block';
            dom.errorText.innerText = err.message;
        } finally {
            dom.processBtn.disabled = false;
            dom.loader.style.display = 'none';
            dom.btnText.innerText = 'CREATED COUNTSHEET';
        }
    }

    // Download hasil ke file Excel
    function download() {
        let cols, dataRows;

        if (currentMethod === 'transaction') {
            // Format baru untuk transaction
            const baseCols = ['Location ID', 'SKU', 'SKU Descr(L)', 'Trace ID', 'Batch Number', 'UOM', 'QTY On Hand'];
            cols = ['No', ...baseCols, 'Qty Actual', 'Remark'];
            dataRows = currentResultRows.map((r, idx) => [
                idx + 1,
                ...baseCols.map(c => r[c] || ''),
                '', // Qty Actual
                ''  // Remark
            ]);
        } else {
            // Format lama untuk location
            if (currentCustomer === 'OCCUPANCY') {
                cols = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
                dataRows = currentResultRows.map(r => cols.map(c => r[c] || ''));
            } else {
                let baseCols = (currentCustomer === 'MAP' || currentCustomer === 'TUMI')
                    ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM','QTY On Hand']
                    : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM','QTY On Hand'];
                cols = ['No', ...baseCols, 'Qty Actual', 'Remark'];
                dataRows = currentResultRows.map((r, idx) => [
                    idx + 1,
                    ...baseCols.map(c => r[c] || ''),
                    '', // Qty Actual
                    ''  // Remark
                ]);
            }
        }

        const data = [cols, ...dataRows];
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Result");
        XLSX.writeFile(wb, `${currentCustomer}_${new Date().getTime()}.xlsx`);
    }

    // Cetak laporan (dengan format print)
    function printReport() {
        if (!currentResultRows.length) return;

        const rows = currentResultRows;
        const rowsPerPage = 25;
        const totalPages = Math.ceil(rows.length / rowsPerPage);

        let baseCols;
        if (currentMethod === 'transaction') {
            baseCols = ['Location ID', 'SKU', 'SKU Descr(L)', 'Trace ID', 'Batch Number', 'UOM', 'QTY On Hand'];
        } else {
            if (currentCustomer === 'OCCUPANCY') {
                baseCols = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
            } else {
                baseCols = (currentCustomer === 'MAP' || currentCustomer === 'TUMI')
                    ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM','QTY On Hand']
                    : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM','QTY On Hand'];
            }
        }
        const printCols = ['No', ...baseCols, 'Qty Actual', 'Remark'];

        const headerCells = printCols.map(colName => {
            let width = columnWidths[colName] || DEFAULT_WIDTH;
            let className = (colName === 'Qty Actual' || colName === 'Remark') ? ' class="print-extra"' : '';
            return `<th${className} style="width: ${width}px;">${colName}</th>`;
        }).join('');

		// Gunakan base64 yang sudah dimuat dari file
		const lincgrpLogo = lincgrpLogoBase64;
		const linclogLogo = linclogLogoBase64;
        let allPagesHtml = '';

        for (let page = 0; page < totalPages; page++) {
            const start = page * rowsPerPage;
            const end = Math.min(start + rowsPerPage, rows.length);
            const pageRows = rows.slice(start, end);

            const bodyRows = pageRows.map((r, idx) => {
                const nomor = start + idx + 1;
                const dataCells = [
                    `<td>${nomor}</td>`,
                    ...baseCols.map(c => `<td>${r[c] || '-'}</td>`)
                ];
                dataCells.push('<td class="print-extra"></td>'); // Qty Actual
                dataCells.push('<td class="print-extra"></td>'); // Remark
                return `<tr>${dataCells.join('')}</tr>`;
            }).join('');

            const pageHtml = `
            <div style="display: flex; align-items: center; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px;">
                <div style="display: flex; align-items: center; flex-shrink: 0;">
                    <img src="${lincgrpLogo}" alt="Lincgrp" style="height: 80px; width: auto;">
                    <div style="border: 1px solid #333; padding: 4px 8px; margin-left: 8px; font-size: 10px; width: 200px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>Nama Counter:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 4px;">
                            <span>Paraf:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                    </div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <h1 style="font-size: 24px; font-weight: 800; color: #1e3a8a; margin: 0;">CYCLE COUNT SHEET</h1>
                    <p style="margin: 2px 0; font-size: 15px;">Customer: ${currentCustomer} | Tanggal: ${formatDateIndonesian(new Date())}</p>                </div>
                <img src="${linclogLogo}" alt="Linclog" style="height: 80px; width: auto; flex-shrink: 0;">
            </div>
            <table class="print-table">
                <thead><tr>${headerCells}</tr></thead>
                <tbody>${bodyRows}</tbody>
            </table>
            <div class="print-footer">
                <p>Dicetak pada: ${formatDateIndonesian(new Date())} ${new Date().toLocaleTimeString('id-ID')} | Halaman ${String(page+1).padStart(2,'0')} of ${String(totalPages).padStart(2,'0')}</p>                <p style="margin-top:4px;">Catatan: Isi kolom Qty Actual dan Remark sesuai hasil count manual.</p>
                <p>PT CIPTA MAPAN LOGISTICS - SITE JABABEKA</p>
            </div>
            `;
            allPagesHtml += pageHtml;
        }

        // Halaman kosong "COUNTSHEET TEMUAN" (23 baris)
        const blankRows = [];
        for (let i = 1; i <= 23; i++) {
            const cells = [
                `<td>${i}</td>`,
                ...baseCols.map(c => `<td></td>`),
                `<td class="print-extra"></td>`,
                `<td class="print-extra"></td>`
            ];
            blankRows.push(`<tr>${cells.join('')}</tr>`);
        }

        const blankPageHtml = `
        <div style="page-break-before: always;">
            <div style="display: flex; align-items: center; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px;">
                <div style="display: flex; align-items: center; flex-shrink: 0;">
                    <img src="${lincgrpLogo}" alt="Lincgrp" style="height: 80px; width: auto;">
                    <div style="border: 1px solid #333; padding: 4px 8px; margin-left: 8px; font-size: 10px; width: 200px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>Nama Counter:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 4px;">
                            <span>Paraf:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                    </div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <h1 style="font-size: 24px; font-weight: 800; color: #1e3a8a; margin: 0;">COUNTSHEET TEMUAN</h1>
                    <p style="margin: 2px 0; font-size: 15px;">Customer: ${currentCustomer} | Tanggal: ${formatDateIndonesian(new Date())}</p>        </div>
                <img src="${linclogLogo}" alt="Linclog" style="height: 80px; width: auto; flex-shrink: 0;">
            </div>
            <table class="print-table">
                <thead><tr>${headerCells}</tr></thead>
                <tbody>
                    ${blankRows.join('')}
                </tbody>
            </table>
            <div class="print-footer">
                <p>Dicetak pada: ${formatDateIndonesian(new Date())} ${new Date().toLocaleTimeString('id-ID')} | Halaman ${String(totalPages+1).padStart(2,'0')} of ${String(totalPages+1).padStart(2,'0')}</p>
                <p style="margin-top:4px;">Catatan: Isi kolom Qty Actual dan Remark sesuai hasil count manual.</p>
                <p>PT CIPTA MAPAN LOGISTICS - SITE JABABEKA</p>
            </div>
        </div>
        `;
        allPagesHtml += blankPageHtml;

        document.getElementById('printContainer').innerHTML = allPagesHtml;
        window.print();
    }

    // ==================== EVENT LISTENERS ====================
    document.querySelectorAll('input[name="processType"]').forEach(r => r.addEventListener('change', renderUploadFields));
    dom.processBtn.addEventListener('click', handleProcess);
    dom.downloadBtn.addEventListener('click', download);
    dom.printBtn.addEventListener('click', printReport);

    // ==================== INISIALISASI AWAL ====================
    renderUploadFields();
})();
</script>
